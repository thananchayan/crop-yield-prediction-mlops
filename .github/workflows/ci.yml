name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Train model and generate artifacts
        run: |
          python -m ml.train

      - name: Show generated artifacts
        run: |
          echo "===== Models ====="
          find artifacts/models -type f

          echo "===== Metrics ====="
          find artifacts/metrics -type f

      - name: Verify generated artifacts
        run: |
          echo "===== Current directory ====="
          pwd

          echo "===== Repository ====="
          ls -la

          echo "===== Artifacts ====="
          find artifacts -type f || true

          echo "===== Model files ====="
          find . -name "*.joblib"

          echo "===== JSON files ====="
          find . -name "*.json"

      - name: Run lint
        run: |
          python -m ruff check app ml tests

      - name: Run formatting check
        run: |
          python -m black --check app ml tests

      - name: Run tests
        run: |
          python -m pytest -v

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: false
          tags: crop-yield-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max